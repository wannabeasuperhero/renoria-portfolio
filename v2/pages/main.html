<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renoria - Main</title>

  <link rel="icon" type="image/svg+xml" href="../assets/icons/Logo_R.svg">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/main.js" defer></script>
</head>
<body>

  <main class="main-frame">
    <header class="topbar">
      <div class="status-wrap">
        <div class="dot"></div>
        <span>Renoria / Main</span>
      </div>

      <div class="login-placeholder">
        Internal system
      </div>
    </header>

    <section class="main-layout">

      <aside class="sidebar">
        <div class="panel">
          <nav class="sidebar-nav">
            <a href="#">Home</a>
            <a href"#">Admin</a>
          </nav>
        </div>

        <div class="panel side-bottom">
          <h2 class="section-title">Present</h2>
          <div class="presence-list">
            <div class="presence-item">Renoria</div>
            <div class="presence-item">Guest</div>
          </div>
        </div>
      </aside>

      <section class="main-column">

  <div class="main-background-logo">
    <img src="../assets/img/Logo_Calderone.png" alt="Logo Renoria">
  </div>

      </section>

      <aside class="right-column">
        <div class="panel">
          <h2 class="section-title">Status</h2>
          <p class="panel-text">Modules online: 1</p>
          <p class="panel-text">Next target: dashboard shell</p>
        </div>

        <div class="panel">
          <nav class="sidebar-nav">
            <a href="#">Forum</a>
            <a href="#">Office</a>
          </nav>
        </div>
      </aside>

    </section>
  </main>

</body>
</html>
