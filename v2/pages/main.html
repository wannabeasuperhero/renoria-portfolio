<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renoria - Main</title>

  <link rel="icon" type="image/svg+xml" href="../assets/icons/Logo_R.svg">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/logs.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
</head>
<body>

  <main class="main-frame">
    <header class="topbar">
      <div class="status-wrap">
        <div class="dot"></div>
        <span>Renoria / Main</span>
      </div>

      <div class="login-placeholder">
        Internal system
      </div>
    </header>

    <section class="main-layout">

      <aside class="sidebar">

        <div class="panel terminal-panel">
          <div class="panel-heading">
            <h2 class="section-title">Terminal</h2>
        </div>

        <div class="terminal-output" id="terminal-output">
          <div class="console-line">
            <span class="console-prefix">renoria@node</span><br>
            <span class="console-command">system idle</span>
        </div>

      <div class="console-output">Awaiting module input...</div>
      </div>
  </div>

        <div class="left-actions">
          <div class="panel action-panel">
            <nav class="sidebar-nav">
              <a href="#">Home</a>
            </nav>
          </div>

          <div class="panel action-panel">
            <nav class="sidebar-nav">
              <a href="#">Admin</a>
            </nav>
          </div>
        </div>

        <div class="panel side-bottom presence-panel">
          <div class="panel-heading">
            <h2 class="section-title">Presence</h2>
          </div>

          <div class="presence-list">
            <a href="#" class="presence-item">Renoria</a>
            <a href="#" class="presence-item">Guest</a>
          </div>
        </div>
      </aside>

      <section class="main-column">
        <div class="main-background-logo">
          <img src="../assets/img/Logo_Calderone.png" alt="">
        </div>
      </section>

      <aside class="right-column">
        <div class="panel status-panel">
          <div class="panel-heading">
            <h2 class="section-title">Status</h2>
          </div>

          <p class="panel-text">Modules online: 1</p>
          <p class="panel-text">Next target: dashboard shell</p>
        </div>

        <div class="right-actions">
          <div class="panel action-panel">
            <nav class="sidebar-nav">
              <a href="#">Forum</a>
            </nav>
          </div>

          <div class="panel action-panel">
            <nav class="sidebar-nav">
              <a href="#">Office</a>
            </nav>
          </div>
        </div>

        <div class="panel log-panel">
          <div class="panel-heading">
            <h2 class="section-title">Current log</h2>
          </div>

          <div class="log" id="main-log-container"></div>
        </div>
      </aside>

    </section>
  </main>

</body>
</html>
