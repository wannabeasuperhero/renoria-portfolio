<div class="board-view">
  <div class="location-title">
    <p class="location-path" id="board-path">Boards</p>
    <h1 class="location-name" id="board-title"></h1>
  </div>

  <hr class="board-separator">

  <div class="btn-row">
    <button class="sidebar-button" id="btn-back">↩ Back</button>
    <button class="sidebar-button" id="btn-home-boards">⌂ Boards</button>
    <button class="sidebar-button primary" id="btn-new-thread">+ New thread</button>
  </div>

  <table class="board-table">
    <thead>
      <tr>
        <th>Autore</th>
        <th class="col-status">Stato</th>
        <th>Titolo</th>
        <th class="col-replies">Risposte</th>
        <th>Ultima risposta</th>
      </tr>
    </thead>
    <tbody id="threads-container"></tbody>
  </table>
</div>
