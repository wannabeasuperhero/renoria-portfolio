<div class="board-view">
  <div class="location-title">
    <p class="location-path" id="board-path">Boards</p>
    <h1 class="location-name" id="board-title"></h1>
  </div>

  <hr class="board-separator">

  <div class="btn-row">
    <button class="sidebar-button" id="btn-back">↩ Back</button>
    <button class="sidebar-button" id="btn-home-boards">⌂ Boards</button>
    <button class="sidebar-button primary" id="btn-new-thread">+ New</button>
  </div>

  <table class="board-table">
    <colgroup>
    <col style="width: 22%">
    <col style="width: 8%">
    <col style="width: 36%">
    <col style="width: 9%">
    <col style="width: 25%">
  </colgroup>
    <thead>
      <tr>
        <th>Author</th>
        <th class="col-status">Status</th>
        <th>Thread</th>
        <th class="col-replies">Replies</th>
        <th>Last Activity</th>
      </tr>
    </thead>
    <tbody id="threads-container"></tbody>
  </table>
</div>
