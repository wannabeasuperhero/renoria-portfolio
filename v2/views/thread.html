<div class="thread-view">
  <div class="location-title">
    <p class="location-path" id="thread-path">Boards / Development</p>
    <h1 class="location-name" id="thread-title">THREAD TITLE</h1>
  </div>

  <hr class="thread-separator">

  <div class="btn-row">
    <button class="sidebar-button" id="btn-back-board">↩ Back</button>
    <button class="sidebar-button" id="btn-home-boards">⌂ Boards</button>
    <button class="sidebar-button primary" id="btn-new-reply">+ Reply</button>
  </div>

  <div class="posts-container" id="posts-container"></div>

  <div class="reply-box">
    <div class="reply-inner">
      <div class="reply-header">
        Reply
      </div>

      <textarea id="reply-input" class="reply-textarea" placeholder="Write your message..."></textarea>

      <div class="reply-actions">
        <button id="btn-send-reply" class="sidebar-button">Send</button>
      </div>
    </div>
  </div>
</div>
